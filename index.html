<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#eef1f3; --card:#ffffff; --ink:#1a2622; --ink2:#48564f; --muted:#8a958f;
  --line:#e7ebed; --line2:#f2f5f6;
  --teal:#15a463; --teal-d:#0e8551; --teal-l:#e3f6ec; --teal-l2:#f2fbf6;
  --amber:#e8731e; --amber-l:#fdeede;
  --green:#15a463; --green-l:#e3f6ec;
  --yellow:#e0950a; --yellow-l:#fdf3da;
  --red:#e25555; --red-l:#fdecec;
  --blue:#2c74c4; --blue-l:#e9f1fb;
  --shadow:0 1px 2px rgba(26,38,34,.04),0 6px 22px rgba(26,38,34,.05);
  --shadow-lg:0 18px 50px rgba(26,38,34,.16);
  --r:18px; --r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
body{background-image:radial-gradient(circle at 15% -10%,rgba(21,164,99,.08),transparent 45%),radial-gradient(circle at 100% 0%,rgba(232,115,30,.06),transparent 38%);min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
h1,h2,h3,h4{font-family:'Archivo',sans-serif;font-weight:700;letter-spacing:-.01em;line-height:1.15}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:14px}
a{color:var(--teal);text-decoration:none}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#f6faf8,#e9f2ed);padding:24px}
.login-card{background:var(--card);border-radius:22px;padding:36px 32px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);text-align:center}
.login-card .logo{font-family:'Archivo';font-weight:800;font-size:30px;letter-spacing:-.03em;color:var(--teal)}
.login-card .logo span{color:var(--amber)}
.login-card .logo-img{display:block;width:200px;max-width:72%;height:auto;margin:2px auto 6px}
.login-card h2{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:24px;letter-spacing:0;color:var(--ink);margin:10px 0 2px}
.login-card p{color:var(--muted);font-size:13px;margin:2px 0 24px}
.pin-field{position:relative;margin-bottom:16px}
.pin-field input{width:100%;height:56px;border:1.5px solid var(--line);border-radius:13px;background:#fff;
  text-align:center;font-family:'IBM Plex Mono';font-size:30px;font-weight:600;letter-spacing:.5em;
  color:var(--ink);padding:0 0 0 .5em;transition:.15s;outline:none;box-sizing:border-box}
.pin-field input::placeholder{letter-spacing:.18em;font-size:15px;font-weight:500;color:var(--muted)}
.pin-field input:focus{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-l)}
.pin-field input.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.login-btn{width:100%;height:50px;border:none;border-radius:13px;background:var(--teal);color:#fff;
  font-family:'Archivo';font-weight:700;font-size:15px;letter-spacing:.02em;cursor:pointer;transition:.15s}
.login-btn:hover{background:#084f49}
.login-btn:active{transform:scale(.98)}
.login-err{color:var(--red);font-size:13px;height:18px;margin-top:14px;font-weight:500}

/* ---------- SHELL ---------- */
#app{display:none;max-width:1320px;margin:0 auto;padding:0 20px 60px}
header.top{display:flex;align-items:center;gap:18px;padding:18px 4px 16px;flex-wrap:wrap}
.brand{font-family:'Archivo';font-weight:800;font-size:22px;letter-spacing:-.03em;color:var(--teal);white-space:nowrap}
.brand span{color:var(--amber)}
.brand-img{display:block;height:38px;width:auto}
.brand small{display:block;font-family:'IBM Plex Sans';font-weight:500;font-size:11px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin-top:3px}
.top-spacer{flex:1}
.tc-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:9px 14px;box-shadow:var(--shadow)}
.tc-box .lab{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;line-height:1.1}
.tc-box .lab b{display:block;font-size:9px;color:var(--teal);font-weight:600}
.tc-box input{width:78px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;text-align:right;font-weight:600;color:var(--ink);background:var(--teal-l2)}
.tc-box .src{font-size:10px;color:var(--muted);max-width:120px;line-height:1.25}
.tc-box .src b{color:var(--green)}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--shadow);transition:.14s}
.icon-btn:hover{border-color:var(--teal);background:var(--teal-l)}

/* nav */
nav.tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:6px;box-shadow:var(--shadow);margin-bottom:22px;overflow-x:auto}
nav.tabs button{flex:1;min-width:120px;border:none;background:transparent;padding:11px 14px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--ink2);display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;white-space:nowrap}
nav.tabs button .dot{width:9px;height:9px;border-radius:3px}
nav.tabs button:hover{background:var(--line2)}
nav.tabs button.active{background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(21,164,99,.30)}
nav.tabs button.active .dot{background:rgba(255,255,255,.85)!important}

.page{display:none;animation:fade .3s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- COMMON UI ---------- */
.section-head{display:flex;align-items:flex-end;gap:14px;margin:4px 2px 16px;flex-wrap:wrap}
.section-head h2{font-size:24px}
.section-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
.section-head .sh-spacer{flex:1}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line2)}
.card-h h3{font-size:15px}
.card-h .tag{margin-left:auto;font-size:11px;color:var(--muted);font-weight:500}
.card-b{padding:16px 18px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:880px){.g2,.g3,.g4{grid-template-columns:1fr}}

.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.14s;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--teal);background:var(--teal-l)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.primary:hover{background:var(--teal-d)}
.btn.amber{background:var(--amber);border-color:var(--amber);color:#fff}
.btn.amber:hover{filter:brightness(.94)}
.btn.ghost{box-shadow:none;background:transparent}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}

/* stats */
.stat{padding:16px 18px}
.stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
.stat .v{font-family:'Archivo';font-weight:700;font-size:27px;letter-spacing:-.02em;margin-top:4px}
.stat .v small{font-size:14px;color:var(--muted);font-weight:600}
.stat .d{font-size:12px;color:var(--muted);margin-top:3px}
.stat.accent{background:linear-gradient(140deg,var(--teal),var(--teal-d));color:#fff;border-color:var(--teal-d)}
.stat.accent .k{color:rgba(255,255,255,.75)}
.stat.accent .d{color:rgba(255,255,255,.78)}

/* tables */
.tbl-wrap{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{background:var(--card);color:var(--muted);font-weight:600;text-align:right;padding:12px 14px;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--line);white-space:nowrap;position:sticky;top:0}
table th:first-child,table td:first-child{text-align:left}
table td{padding:11px 14px;border-bottom:1px solid var(--line2);text-align:right;white-space:nowrap}
table tr:last-child td{border-bottom:none}
table tbody tr:hover{background:var(--teal-l2)}
table .num{font-family:'IBM Plex Mono';font-variant-numeric:tabular-nums}
table tr.total td{font-weight:700;background:var(--teal-l);border-top:1.5px solid var(--teal)}
.tinp{width:100%;max-width:92px;border:1px solid var(--line);border-radius:9px;padding:6px 9px;text-align:right;font-family:'IBM Plex Mono';background:var(--line2);color:var(--ink);transition:.13s;-moz-appearance:textfield;appearance:textfield}
.tinp::-webkit-outer-spin-button,.tinp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.tinp:hover{background:#fff;border-color:#d3dad8}
.tinp:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-l)}
.tinp.edited{border-color:var(--amber);background:var(--amber-l)}
.tsel{border:1px solid var(--line);border-radius:7px;padding:5px 7px;background:#fff}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;line-height:1.4}
.pill::before{content:'';width:7px;height:7px;border-radius:50%}
.pill.v{background:var(--green-l);color:var(--green)}.pill.v::before{background:var(--green)}
.pill.a{background:var(--yellow-l);color:var(--yellow)}.pill.a::before{background:var(--yellow)}
.pill.r{background:var(--red-l);color:var(--red)}.pill.r::before{background:var(--red)}
.delta{font-weight:600;font-size:12px}
.delta.up{color:var(--green)}.delta.down{color:var(--red)}.delta.flat{color:var(--muted)}

/* labeled inputs (params) */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:12px;font-weight:600;color:var(--ink2)}
.field label small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:1px}
.field .iw{display:flex;align-items:center;gap:8px}
.field input,.field select{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--line2);color:var(--ink);font-family:'IBM Plex Mono'}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-l)}
.field .unit{font-size:12px;color:var(--muted);min-width:48px}
.params-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 26px}
@media(max-width:680px){.params-grid{grid-template-columns:1fr}}
.params-sub{grid-column:1/-1;font-family:'Archivo';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line2)}

/* breakdown bar */
.bd{display:flex;height:13px;border-radius:7px;overflow:hidden;margin:10px 0 6px;background:var(--line2)}
.bd span{height:100%}
.bd-leg{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:11.5px;color:var(--ink2)}
.bd-leg i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,30,28,.5);backdrop-filter:blur(3px);z-index:150;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;overflow-x:hidden;box-shadow:var(--shadow-lg);animation:pop .22s ease}
.modal.wide{max-width:840px}
@media(max-width:900px){.modal.wide{max-width:560px}}
.gauto{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.gauto>*{min-width:0}
.gkpi{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.gkpi>*{min-width:0}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-h{padding:20px 22px 0;display:flex;align-items:flex-start;gap:12px}
.modal-h h3{font-size:19px;flex:1}
.modal-h .x{border:none;background:var(--line2);width:32px;height:32px;border-radius:9px;font-size:17px;color:var(--ink2)}
.modal-h .x:hover{background:var(--red-l);color:var(--red)}
.modal-b{padding:16px 22px 22px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:0 22px 22px}

/* simulator */
.sim-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 70px;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line2);font-size:13px}
.sim-row.head{font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--line)}
.sim-row input{border:1px solid var(--line);border-radius:8px;padding:7px 9px;text-align:right;font-family:'IBM Plex Mono';background:var(--line2);width:100%}
.sim-row .base{color:var(--muted);font-family:'IBM Plex Mono';text-align:right}

.banner{padding:12px 16px;border-radius:11px;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.banner.warn{background:var(--amber-l);color:#8a5212;border:1px solid #f0d7b3}
.banner.info{background:var(--blue-l);color:#1d4e82;border:1px solid #c5dcf2}
.banner.ok{background:var(--green-l);color:#15703d;border:1px solid #bfe6cf}
.note{font-size:12px;color:var(--muted);line-height:1.5}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}
.empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:13px}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:7px;background:var(--line2);color:var(--ink2)}
.chip.teal{background:var(--teal-l);color:var(--teal)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.mini-x{border:none;background:transparent;color:var(--muted);font-size:15px;padding:2px 6px;border-radius:6px}
.mini-x:hover{background:var(--red-l);color:var(--red)}
.search{border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:200px;background:#fff}
.search:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l)}

/* ---------- SUB-NAV (Costos / Precios dentro de cada línea) ---------- */
.subnav{display:inline-flex;gap:4px;background:var(--line2);border:1px solid var(--line);border-radius:13px;padding:4px;margin:0 2px 18px}
.subnav button{border:none;background:transparent;padding:8px 20px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink2);transition:.14s}
.subnav button:hover{color:var(--ink)}
.subnav button.active{background:var(--card);color:var(--teal);box-shadow:var(--shadow)}
/* fórmula bajo cada componente de costo (paso a paso) */
.formula{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--muted);line-height:1.5;font-weight:400}
td .formula{display:block;margin-top:3px;white-space:normal}
/* matriz de recetas */
.matrix td,.matrix th{padding:8px 9px}
.matrix .badrow td{background:var(--red-l)}
/* fila desplegable de detalle */
.exp-row td{background:var(--teal-l2);border-bottom:1px solid var(--line)!important}
.exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px 20px;text-align:left;padding:6px 2px}
.exp-grid .ei{font-size:12px;color:var(--ink2)}
.exp-grid .ei b{display:block;font-family:'IBM Plex Mono';font-size:14px;color:var(--ink);font-weight:600;margin-top:1px}
.exp-grid .ei .ef{display:block;font-family:'IBM Plex Mono';font-size:10px;color:var(--muted);margin-top:1px}
.lnk{cursor:pointer;color:var(--teal);font-weight:600;font-size:11.5px;white-space:nowrap}
.lnk:hover{text-decoration:underline}
/* fila de variante clickeable + build-up por variante */
.clickrow td{transition:background .12s}
.clickrow:hover td{background:var(--teal-l)}
.accent-num{color:var(--teal)}
.buildup .bu{display:flex;justify-content:space-between;align-items:center;padding:6px 2px;border-bottom:1px dashed var(--line);font-size:12.5px;color:var(--ink2)}
.buildup .bu b{font-family:'IBM Plex Mono';color:var(--ink)}
.buildup .bu.op{color:var(--muted)}
.buildup .bu.sum b{color:var(--teal)}
.buildup .bu.grand{border-bottom:none;font-weight:600;font-size:14px;color:var(--ink)}
.buildup .bu.grand b{color:var(--teal)}
/* barra de filtros */
.filterbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-left:auto}
.filterbar .search{margin-left:0}
</style>
</head>
<body>

<!-- LOGIN -->

function deepMerge(base,ovr){ // mantener estructura si el seed creció
  if(Array.isArray(base)) return ovr!=null?ovr:base;
  if(typeof base==='object'&&base){ const o={...base};
    for(const k in base) o[k]=deepMerge(base[k], ovr?ovr[k]:undefined);
    if(ovr) for(const k in ovr) if(!(k in base)) o[k]=ovr[k];
    return o; }
  return ovr!=null?ovr:base;
}

async function loadState(){
  let data=null;

  S = data ? deepMerge(JSON.parse(JSON.stringify(SEED)), data) : JSON.parse(JSON.stringify(SEED));
}

/* ---- FILM PE ---- */
function calcPE(){
  const p=S.pe.params, tc=TC();
  const energia=(p.motores*p.consumoMotor*p.usdkwh)/p.prodHora;
  const MO=(p.valorHora*p.operarios*p.cargas)/p.prodHora/tc;
  const proc=energia+MO+p.otrosVarios+p.otrosIndirectos;
  const idx={}; S.pe.insumos.forEach(i=>idx[i.cod]=i.usd);
  let mpBase=0; S.pe.receta.forEach(r=>mpBase+=r.p*(idx[r.cod]||0));
  const factor=1/(1-p.merma);
  const mpAjust=mpBase*factor;
  const total=mpAjust+proc;
  return {energia,MO,otros:p.otrosVarios,indirectos:p.otrosIndirectos,proc,
    mpBase,factor,mpAjust,total,totalARS:total*tc};
}

/* ---- PET LÁMINA ---- */
function petProc(){
  const p=S.pet.params, tc=TC();
  const energia=p.energia;
  const MO=(p.valorHora*p.operarios*p.cargas)/p.prodHora/tc;
  const cono=((p.conoARSkg*p.conoKgBobina)/p.kgBobinaProd)/tc;
  const pallet=(p.palletARS/p.palletCap)/tc;
  const stretch=(cono+pallet)*p.stretchPct;
  const flete=(p.fletePallet*p.pctFlete/p.palletCap)/tc;
  const otros=p.otrosVarios, indirectos=p.otrosIndirectos;
  const totalCFlete=energia+MO+cono+pallet+stretch+flete+otros+indirectos;
  return {energia,MO,cono,pallet,stretch,flete,otros,indirectos,totalCFlete,totalSFlete:totalCFlete-flete};
}
function petVariantes(){
  const p=S.pet.params, proc=petProc(), tc=TC();
  const u=S.pet.insumos.map(i=>i.usd);
  const factor=1/(1-(p.merma-p.recuperacion));
  return S.pet.variantes.map(v=>{
    let mpBase=0; v.r.forEach((x,i)=>mpBase+=x*(u[i]||0));
    const mpAjust=mpBase*factor;
    return {nom:v.nom,mpBase,mpAjust,procC:proc.totalCFlete,procS:proc.totalSFlete,
      cFlete:mpAjust+proc.totalCFlete, sFlete:mpAjust+proc.totalSFlete, arsC:(mpAjust+proc.totalCFlete)*tc};
  });
}
function petClientRow(c,variantes){
  const n=S.pet.net, vr=variantes[c.v]||variantes[0];
  const costo=vr.cFlete, precio=c.act;
  const bruta=precio-costo, margenBruto=precio?bruta/precio:0;
  const gastos=precio*(n.admin+n.iibb+n.dyc+n.financiero);
  const gan=Math.max(0,(precio-costo-gastos)*n.ganancias);
  const netoUSD=precio-costo-gastos-gan, margenNeto=precio?netoUSD/precio:0;
  const aumento=c.ant?(c.act-c.ant)/c.ant:0;
  return {...c,variante:vr.nom,costo,precio,bruta,margenBruto,gastos,gan,netoUSD,margenNeto,aumento};
}

/* ---- LAMINADO PET/PE ---- */
function petpeProc(){
  const p=S.petpe.params, tc=TC();
  const adhes=S.petpe.adhesivos.reduce((a,x)=>a+x.usd*x.pct,0);
  const MOlam=(p.salLam*p.opLam*p.cargasLam)/p.prodLam/tc;
  const enerLam=(p.motoresLam*p.consumoLam*p.usdkwhLam)/p.prodLam;
  const subLam=adhes+MOlam+enerLam;
  const MOref=(p.salRef*p.opRef*p.cargasRef)/p.prodRef/tc;
  const enerRef=(p.motoresRef*p.consumoRef*p.usdkwhRef)/p.prodRef;
  const subRef=MOref+enerRef+p.otrosRef;
  return {adhes,MOlam,enerLam,subLam,MOref,enerRef,otrosRef:p.otrosRef,subRef,procKg:subLam+subRef};
}
function petpeCostPET(){ const p=S.petpe.params; if(p.linkPET){ const v=petVariantes()[0]; return v.cFlete; } return p.costoLaminaPET; }
function petpeCostPE(){ const p=S.petpe.params; if(p.linkPE){ return calcPE().total; } return p.costoLaminaPE; }
function petpeRow(pr){
  const p=S.petpe.params, n=S.petpe.net, proc=petpeProc(), tc=TC();
  const cPETkg=petpeCostPET(), cPEkg=petpeCostPE();
  const yPET=(pr.aFin*pr.tiras)/pr.aPET, yPE=(pr.aFin*pr.tiras)/pr.aPE;
  const gPET=pr.ePET*p.densPET, gPE=pr.ePE*p.densPE, gTot=gPET+gPE;
  const pPET=gPET/gTot, pPE=gPE/gTot;
  const kgPET=pPET/yPET, kgPE=pPE/yPE, kgTot=kgPET+kgPE;
  const cPET=kgPET*cPETkg, cPE=kgPE*cPEkg, cProc=kgTot*proc.procKg;
  const costo=cPET+cPE+cProc, precio=pr.precio;
  const margenBruto=precio?(precio-costo)/precio:0;
  const gastos=precio*(n.admin+n.iibb+n.dyc+n.financiero);
  const preGan=precio-costo-gastos;
  const gan=Math.max(0,preGan*n.ganancias);
  const netoUSD=preGan-gan, margenNeto=precio?netoUSD/precio:0;
  return {...pr,yPET,yPE,gPET,gPE,pPET,pPE,kgPET,kgPE,kgTot,cPET,cPE,cProc,costo,
    margenBruto,gastos,preGan,gan,netoUSD,margenNeto};
}

/* ---- BANDEJAS ---- */
function bandejaCost(prod){
  const p=S.bandejas.params, tc=TC();
  const MOh=p.salario*p.operarios*(1+p.cargas);
  const desp=prod.bruto-prod.neto;
  const mpUtil=(prod.neto+desp*(1-p.recuperacion))/1000;
  const precioMP=prod.mat==='Negro'?p.mpNegro:p.mpCristal;
  const cMP=mpUtil*precioMP, cMO=(MOh/prod.vel)/tc, cEner=mpUtil*p.energia, cOtros=mpUtil*prod.otros;
  const totalU=cMP+cMO+cEner+cOtros;
  return {desp,mpUtil,cMP,cMO,cEner,cOtros,totalU,usdMillar:totalU*1000};
}
function bandejaCostByCod(cod){ const pr=S.bandejas.productos.find(x=>x.cod===cod); return pr?bandejaCost(pr).usdMillar:0; }

  return `<div class="bd">${bars}</div><div class="bd-leg">${leg}</div>`;
}

function moduleSummary(){

  const petC=S.pet.clientes.map(c=>petClientRow(c,vr));
  const petAvg=petC.reduce((a,c)=>a+c.margenNeto,0)/(petC.length||1);
  const petMin=petC.reduce((m,c)=>c.margenNeto<m.margenNeto?c:m,petC[0]||{margenNeto:0});
  const petMax=petC.reduce((m,c)=>c.margenNeto>m.margenNeto?c:m,petC[0]||{margenNeto:0});

  const ppRows=S.petpe.productos.map(petpeRow);
  const ppAvg=ppRows.reduce((a,r)=>a+r.margenNeto,0)/(ppRows.length||1);
  const ppMin=ppRows.reduce((m,r)=>r.margenNeto<m.margenNeto?r:m,ppRows[0]||{margenNeto:0});
  const ppMax=ppRows.reduce((m,r)=>r.margenNeto>m.margenNeto?r:m,ppRows[0]||{margenNeto:0});

  const peTot=calcPE().total;

  // bandejas: margen bruto sobre precio
  const bp=S.bandejas.params; const bRows=[];
  S.bandejas.ensaladeras.forEach(e=>{ Object.entries(e.p).forEach(([cod,val])=>{
    const precio=e.mon==='USD'?val:val/TC(); const costo=bandejaCostByCod(cod);
    bRows.push({cli:e.cli,cod,precio,costo,m:precio?(precio-costo)/precio:0}); }); });
  Object.entries(S.bandejas.clamshells).forEach(([cod,val])=>{ const costo=bandejaCostByCod(cod);
    bRows.push({cli:'Lista clamshells',cod,precio:val,costo,m:val?(val-costo)/val:0}); });
  const bAvg=bRows.reduce((a,r)=>a+r.m,0)/(bRows.length||1);
  const bMin=bRows.reduce((m,r)=>r.m<m.m?r:m,bRows[0]||{m:0});
  const bMax=bRows.reduce((m,r)=>r.m>m.m?r:m,bRows[0]||{m:0});

  const dist=(rows,acc,sg=0.30,sa=0.15)=>{ let g=0,y=0,r=0; rows.forEach(x=>{const s=semaforo(acc(x),sg,sa); if(s==='v')g++;else if(s==='a')y++;else r++;}); return {g,y,r,n:rows.length}; };
  const petD=dist(petC,c=>c.margenNeto), ppD=dist(ppRows,r=>r.margenNeto), bD=dist(bRows,r=>r.m,bp.semVerde,bp.semAmarillo);

  // margen neto combinado (PET + Laminado)
  const netoItems=petC.length+ppRows.length;
  const netoAvg=(petC.reduce((a,c)=>a+c.margenNeto,0)+ppRows.reduce((a,r)=>a+r.margenNeto,0))/(netoItems||1);

  // peor ítem global
  const cands=[{mod:'PET',name:(petMin.cli||'-'),m:petMin.margenNeto||0},
    {mod:'Laminado',name:(ppMin.cli||'-')+' '+(ppMin.med||''),m:ppMin.margenNeto||0},
    {mod:'Bandejas',name:(bMin.cli||'-')+' '+(bMin.cod||''),m:bMin.m||0}];
  const worst=cands.reduce((a,b)=>b.m<a.m?b:a,cands[0]);

  return {petC,petAvg,petMin,petMax,petD,ppRows,ppAvg,ppMin,ppMax,ppD,peTot,bRows,bAvg,bMin,bMax,bD,netoAvg,netoItems,worst};
}

  <div class="grid g2">

        </tbody></table></div>
        <div class="note" style="margin-top:12px">PET y Laminado: <b>margen neto</b> (descuenta gastos comerciales + Ganancias). Bandejas: <b>margen bruto</b> sobre precio (sin gastos comerciales), objetivo ≥ ${pct(S.bandejas.params.semVerde,0)}.</div>
      </div>
    </div>
    <div class="card">

        <div class="tbl-wrap"><table><tbody>

/* ============================================================
   SUB-NAVEGACIÓN + ANATOMÍA DE COSTO (compartido por las líneas)
   ============================================================ */
const subTab={pet:'costos',pe:'costos',petpe:'costos',bandejas:'costos'};
let ppExp=new Set(), bExp=new Set();
function subnav(mod,tabs){
  return `<nav class="subnav" data-subnav="${mod}">${tabs.map(t=>
    `<button data-sub="${t.id}" class="${subTab[mod]===t.id?'active':''}">${t.label}</button>`).join('')}</nav>`;
}
function wireSub(mod,fn){
  $$(`[data-subnav="${mod}"] [data-sub]`).forEach(b=>b.onclick=()=>{ subTab[mod]=b.dataset.sub; fn(); });
}
const nf=v=>(v||0).toLocaleString('es-AR');
/* tarjeta de anatomía: parts=[{label,formula,usd,color}] */
function anatomyCard(title,parts,totalLabel,{tag='',unit='/kg',dec=4}={}){
  const tc=TC(), tot=parts.reduce((a,p)=>a+p.usd,0)||1;
  const bar=breakdownBar(parts.map(p=>({label:p.label,val:p.usd,color:p.color})));
  return `<div class="card"><div class="card-h"><h3>${title}</h3>${tag?`<span class="tag">${tag}</span>`:''}</div>
    <div class="card-b">${bar}
    <div class="tbl-wrap" style="margin-top:14px"><table><thead><tr>
      <th>Componente</th><th>USD${unit}</th><th>ARS${unit}</th><th>% costo</th></tr></thead><tbody>
      ${parts.map(p=>`<tr><td style="white-space:normal;text-align:left"><b>${p.label}</b>${p.formula?`<span class="formula">${p.formula}</span>`:''}</td>
        <td class="num">${usd(p.usd,dec)}</td><td class="num">${ars(p.usd*tc)}</td><td class="num">${pct(p.usd/tot,1)}</td></tr>`).join('')}
      <tr class="total"><td style="text-align:left">${totalLabel}</td><td class="num">${usd(tot,dec)}</td><td class="num">${ars(tot*tc)}</td><td class="num">100%</td></tr>
    </tbody></table></div></div></div>`;
}

let petSearch='', petFilter={mat:'',col:''}, petVarExp=new Set(), petReportDim='cli';
function petMaterial(nom){ return /virgen/i.test(nom)?'PET Virgen':'rPET'; }
function petColor(nom){ return nom.replace(/rPET\s*/i,'').replace(/PET\s*Virgen\s*/i,'').replace(/PET\s*/i,'').trim()||'Cristal'; }

/* detalle desplegable de una variante (receta + build-up del costo) */
function petVarDetail(vi,v,proc,p,factor,tc){
  const vv=S.pet.variantes[vi];
  const recetaRows=vv.r.map((x,j)=>{ if(x<=0) return ''; const ins=S.pet.insumos[j]||{};
    return `<tr><td style="text-align:left"><span class="chip">${ins.cod}</span> ${ins.desc}</td>
      <td class="num">${pct(x,0)}</td><td class="num">${usd(ins.usd||0,2)}</td><td class="num">${usd(x*(ins.usd||0),3)}</td></tr>`;}).filter(Boolean).join('');
  const procMini=[['Energía',proc.energia],['Mano de obra',proc.MO],['Cono',proc.cono],['Pallet',proc.pallet],
    ['Stretch+etiq.',proc.stretch],['Flete',proc.flete],['Otros+indir.',proc.otros+proc.indirectos]]
    .map(([l,val])=>`<div class="ei">${l}<b>${usd(val,4)}</b></div>`).join('');
  return `<tr class="exp-row"><td colspan="9"><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div>
      <div class="params-sub" style="margin-bottom:6px">Receta — composición de materia prima</div>
      <div class="tbl-wrap"><table><thead><tr><th>Insumo</th><th>%</th><th>USD/kg</th><th>Aporte</th></tr></thead><tbody>${recetaRows}
        <tr class="total"><td style="text-align:left">MP base</td><td></td><td></td><td class="num">${usd(v.mpBase,3)}</td></tr></tbody></table></div>
    </div>
    <div>
      <div class="params-sub" style="margin-bottom:6px">Cómo se arma el costo</div>
      <div class="buildup">
        <div class="bu"><span>MP base</span><b>${usd(v.mpBase,3)}</b></div>
        <div class="bu op"><span>× factor merma neta · 1 ÷ (1 − ${pct(p.merma-p.recuperacion,0)})</span><b>× ${factor.toFixed(3)}</b></div>
        <div class="bu sum"><span>MP ajustada</span><b>${usd(v.mpAjust,3)}</b></div>
        <div class="bu op"><span>+ Procesamiento c/flete</span><b>${usd(proc.totalCFlete,3)}</b></div>
        <div class="exp-grid" style="margin:4px 0 8px">${procMini}</div>
        <div class="bu grand"><span>= Total c/flete</span><b>${usd(v.cFlete,3)} · ${ars(v.arsC)}</b></div>
        <div class="bu"><span>− Flete (cliente retira)</span><b>${usd(v.sFlete,3)}</b></div>
      </div>
    </div>
  </div></td></tr>`;
}

/* ============================================================
   INFORME PET (dinámico) + HISTORIAL (PDF) + EXPORTS + CALCULADORA
   ============================================================ */
let petReportSort='neto', petReportAsc=false, petRepExp=new Set();

function petReportGroups(dim){
  const vr=petVariantes();
  const rows=S.pet.clientes.map(c=>petClientRow(c,vr));
  const keyOf=r=> dim==='cli'?r.cli : dim==='mat'?petMaterial(r.variante) : dim==='col'?petColor(r.variante) : r.variante;
  const map={};
  rows.forEach(r=>{ const k=keyOf(r); (map[k]=map[k]||[]).push(r); });
  let g=Object.keys(map).map(k=>{ const arr=map[k];
    const v=arr.filter(r=>r.margenNeto>=0.30).length, a=arr.filter(r=>r.margenNeto>=0.15&&r.margenNeto<0.30).length, rr=arr.filter(r=>r.margenNeto<0.15).length;
    return { grupo:k, n:arr.length,
      precio:arr.reduce((s,r)=>s+r.precio,0)/arr.length,
      costo:arr.reduce((s,r)=>s+r.costo,0)/arr.length,
      neto:arr.reduce((s,r)=>s+r.margenNeto,0)/arr.length,
      peor:Math.min.apply(null,arr.map(r=>r.margenNeto)),
      mejor:Math.max.apply(null,arr.map(r=>r.margenNeto)),
      v,a,r:rr, rows:arr }; });
  const key=petReportSort;
  g.sort((x,y)=> petReportAsc ? x[key]-y[key] : y[key]-x[key]);
  return g;
}
function openPetReport(){
  const dims=[['cli','Cliente'],['mat','Material'],['col','Color'],['var','Variante']];
  const sorts=[['neto','Margen'],['precio','Precio'],['costo','Costo'],['n','Ítems']];
  const lab=dims.find(d=>d[0]===petReportDim)[1];
  const g=petReportGroups(petReportDim);
  const vr=petVariantes(); const allRows=S.pet.clientes.map(c=>petClientRow(c,vr));
  const gAvg=allRows.reduce((s,r)=>s+r.margenNeto,0)/(allRows.length||1);
  const enRojo=allRows.filter(r=>r.margenNeto<0.15).length;
  const best=g.reduce((m,x)=>x.neto>m.neto?x:m,g[0]||{grupo:'-',neto:0});
  const worst=g.reduce((m,x)=>x.neto<m.neto?x:m,g[0]||{grupo:'-',neto:0});
  const maxAbs=Math.max(0.0001,...g.map(x=>Math.abs(x.neto)));
  const barColor=s=> s==='v'?'var(--green)':s==='a'?'var(--amber)':'var(--red)';

  const bars=g.map(x=>{ const s=semaforo(x.neto); const w=Math.max(3,Math.min(100,Math.abs(x.neto)/maxAbs*100)); const open=petRepExp.has(x.grupo);
    return `<div class="repbar" data-rgrp="${encodeURIComponent(x.grupo)}" style="cursor:pointer;display:grid;grid-template-columns:170px 1fr 92px;gap:10px;align-items:center;padding:7px 4px;border-bottom:1px solid var(--line)">
        <div style="text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><b>${x.grupo}</b> <span class="note">${x.n} cli</span></div>
        <div style="position:relative;height:20px;background:var(--line2);border-radius:6px;overflow:hidden">
          <div style="position:absolute;left:0;top:0;height:100%;width:${w}%;background:${barColor(s)};opacity:.85;border-radius:6px"></div>
        </div>
        <div style="text-align:right"><b>${pct(x.neto,1)}</b> <span class="lnk">${open?'▲':'▼'}</span></div>
      </div>
      ${open?`<div class="exp-row" style="display:block;padding:8px 6px"><div class="tbl-wrap"><table><thead><tr><th>Cliente</th><th>Variante</th><th>Precio</th><th>Costo</th><th>M.Neto%</th><th>Estado</th></tr></thead><tbody>
        ${x.rows.slice().sort((p,q)=>p.margenNeto-q.margenNeto).map(r=>{const ss=semaforo(r.margenNeto);
          return `<tr><td style="text-align:left">${r.cli}</td><td style="text-align:left">${r.variante}</td><td class="num">${usd(r.precio,2)}</td><td class="num">${usd(r.costo,2)}</td><td class="num"><b>${pct(r.margenNeto,1)}</b></td><td><span class="pill ${ss}">${semLabel(ss)}</span></td></tr>`;}).join('')}
      </tbody></table></div></div>`:''}`;}).join('');

  openModal(`<div class="modal-h"><h3>📊 Informe PET — por ${lab.toLowerCase()}</h3><button class="x" onclick="closeModal()">✕</button></div>
   <div class="modal-b">
     <div class="gkpi" style="margin-bottom:14px">
       <div class="card stat accent"><div class="card-b stat"><div class="k">Clientes</div><div class="v">${allRows.length}</div><div class="d">${g.length} ${lab.toLowerCase()}s</div></div></div>
       <div class="card stat"><div class="card-b stat"><div class="k">Margen neto prom.</div><div class="v">${pct(gAvg,1)}</div><div class="d">global</div></div></div>
       <div class="card stat"><div class="card-b stat"><div class="k">Mejor ${lab.toLowerCase()}</div><div class="v" style="font-size:18px">${pct(best.neto,1)}</div><div class="d">${best.grupo}</div></div></div>
       <div class="card stat"><div class="card-b stat"><div class="k">En rojo</div><div class="v">${enRojo}</div><div class="d">margen &lt; 15%</div></div></div>
     </div>
     <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px">
       <span class="note">Agrupar:</span>${dims.map(d=>`<button class="btn sm ${petReportDim===d[0]?'primary':''}" data-rdim="${d[0]}">${d[1]}</button>`).join('')}
       <span class="note" style="margin-left:10px">Ordenar:</span>${sorts.map(s=>`<button class="btn sm ${petReportSort===s[0]?'primary':''}" data-rsort="${s[0]}">${s[1]}</button>`).join('')}
       <button class="btn sm" data-rasc>${petReportAsc?'▲ asc':'▼ desc'}</button>
     </div>
     <div style="margin-bottom:6px">${bars||'<div class="empty">Sin datos.</div>'}</div>
     <div class="note">Tocá una barra para ver los clientes del grupo. Color = semáforo del margen neto promedio.</div>
   </div>
   <div class="modal-foot"><button class="btn" id="petRepExport">⬇ Exportar informe (Excel)</button><button class="btn primary" onclick="closeModal()">Cerrar</button></div>`,true);
  $$('#modal [data-rdim]').forEach(b=>b.onclick=()=>{ petReportDim=b.dataset.rdim; petRepExp.clear(); openPetReport(); });
  $$('#modal [data-rsort]').forEach(b=>b.onclick=()=>{ petReportSort=b.dataset.rsort; openPetReport(); });
  $('#modal [data-rasc]').onclick=()=>{ petReportAsc=!petReportAsc; openPetReport(); };
  $$('#modal [data-rgrp]').forEach(b=>b.onclick=()=>{ const k=decodeURIComponent(b.dataset.rgrp); petRepExp.has(k)?petRepExp.delete(k):petRepExp.add(k); openPetReport(); });
  $('#petRepExport').onclick=()=>exportPetReport(petReportDim,g);
}
async function exportPetReport(dim,groups){
  const labels={cli:'Cliente',mat:'Material',col:'Color',var:'Variante'};
  const wb=new ExcelJS.Workbook(); const ws=wb.addWorksheet('Informe '+labels[dim]);
  const H=[{t:labels[dim],k:'grupo',w:26},{t:'Ítems',k:'n',w:9,fmt:XF.int},{t:'Precio prom.',k:'precio',w:13,fmt:XF.usd2},
    {t:'Costo prom.',k:'costo',w:13,fmt:XF.usd2},{t:'Margen neto prom.',k:'neto',w:16,fmt:XF.pct,sem:true},
    {t:'Peor',k:'peor',w:11,fmt:XF.pct},{t:'Mejor',k:'mejor',w:11,fmt:XF.pct},{t:'🟢',k:'v',w:6,fmt:XF.int},{t:'🟡',k:'a',w:6,fmt:XF.int},{t:'🔴',k:'r',w:6,fmt:XF.int}];
  groups.forEach(x=>{ x.__sg=0.30; x.__sa=0.15; });
  petTitle(wb,ws,'PET Lámina · Informe por '+labels[dim],H.length); setCols(ws,H); headerRow(ws,4,H); dataRows(ws,5,H,groups);
  ws.views=[{state:'frozen',ySplit:4}];
  await download(wb,'Winflex_PET_informe_'+dim+'.xlsx');
}

    <div class="modal-b"><div class="note" style="margin-bottom:12px">Guarda una foto de la lista PET actual (cliente, variante y precio) más el TC. La lista vigente sigue siendo la “activa”; las guardadas quedan en el historial para consultar, imprimir o reactivar.</div>

    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="petSnapSave">Guardar versión</button></div>`);
  $('#petSnapLabel').focus();

    const vr=petVariantes(); const rr=S.pet.clientes.map(c=>petClientRow(c,vr));
    S.pet.listHistory=S.pet.listHistory||[];
    S.pet.listHistory.unshift({ id:Date.now(), date:nowISO(),

  S.pet.listHistory=S.pet.listHistory||[];

  const curP=rr.reduce((a,r)=>a+r.precio,0)/(rr.length||1), curN=rr.reduce((a,r)=>a+r.margenNeto,0)/(rr.length||1);
  const card=(active,title,sub,tc,p,n,actions)=>`
    <div class="histcard" style="border:1px solid ${active?'var(--teal)':'var(--line)'};background:${active?'var(--teal-l)':'var(--card)'};border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer" ${active?'data-curpdf':'data-hpdf="'+actions+'"'}>

        </div>

    <div class="modal-b">
      <div class="note" style="margin-bottom:12px">La tarjeta resaltada es la lista <b>activa</b> (en uso). Tocá cualquier tarjeta para abrir su PDF listo para imprimir o descargar. Usá <b>Activar</b> para cambiar la lista en uso.</div>
      ${card(true,'Lista actual (en edición)','Se actualiza con lo que cargás en la solapa Precios',TC(),curP,curN,'')}
      ${S.pet.listHistory.length?S.pet.listHistory.map(h=>card(false,h.label,new Date(h.date).toLocaleString('es-AR'),h.tc,h.avgPrecio,h.avgNeto,h.id)).join('')
        :'<div class="empty" style="padding:14px">Todavía no guardaste ninguna versión. Usá “💾 Guardar lista” en la solapa Precios.</div>'}
    </div>
    <div class="modal-foot"><button class="btn primary" onclick="closeModal()">Cerrar</button></div>`);

function generatePetListPDF(id){
  if(!window.jspdf||!window.jspdf.jsPDF){ toast('Generador de PDF no disponible','err'); return; }
  let label, tc, rows, isCur=(id==='__cur__');
  if(isCur){ label='Lista actual'; tc=TC(); rows=S.pet.clientes.map(c=>({cli:c.cli,v:c.v,act:c.act})); }
  else { const h=(S.pet.listHistory||[]).find(x=>x.id==id); if(!h){toast('Versión no encontrada','err');return;} label=h.label; tc=h.tc; rows=h.rows; }
  const vr=petVariantes();
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  // encabezado
  doc.setFillColor(40,168,92); doc.rect(0,0,W,68,'F');

/* ---- Logo para Excel ---- */
function winflexLogoDataURL(){
  const img=document.querySelector('#login .logo-img')||document.querySelector('.brand-img')||document.querySelector('.logo-img');
  return img&&img.src&&img.src.indexOf('data:')===0 ? img.src : null;
}
function addLogoToSheet(wb,ws,ncols){
  try{
    const url=winflexLogoDataURL(); if(!url) return;
    const base64=url.split(',')[1];
    const ext=/image\/jpe?g/.test(url)?'jpeg':'png';
    const imgId=wb.addImage({base64,extension:ext});
    ws.addImage(imgId,{tl:{col:Math.max(0,ncols-2),row:0.12},ext:{width:110,height:42}});
  }catch(e){}
}

/* ============================================================
   CALCULADORA DE COSTOS PET (en el momento)
   ============================================================ */
let petCalc=null;
function petCalcDefaults(){
  const p=S.pet.params, proc=petProc();
  petCalc={ vi:0, r:S.pet.variantes[0].r.slice(0,6),
    mp:S.pet.insumos.slice(0,6).map(i=>i.usd),
    tc:Math.round(TC()), merma:(p.merma-p.recuperacion), proc:proc.totalCFlete, flete:true, qty:1000 };
}
function petCalcCompute(){
  const c=petCalc; let mpBase=0; c.r.forEach((x,i)=>mpBase+=x*(c.mp[i]||0));
  const factor=1/(1-c.merma); const mpAjust=mpBase*factor;
  const costoU=mpAjust+c.proc; const sum=c.r.reduce((a,x)=>a+x,0);
  return {mpBase,factor,mpAjust,proc:c.proc,costoU,arsU:costoU*c.tc,sum,
    totalUSD:costoU*c.qty,totalARS:costoU*c.tc*c.qty};
}
function petCalcResultHTML(){
  const c=petCalc, r=petCalcCompute();
  const ok=Math.abs(r.sum-1)<0.001;
  const cods=S.pet.insumos.slice(0,6);
  const aportes=c.r.map((x,i)=>({label:cods[i].cod,val:x*(c.mp[i]||0),color:['var(--amber)','#d6a96d','var(--blue)','#9b6dd6','#444','#2c74c4'][i]||'var(--muted)'}));
  const bar=breakdownBar([{label:'MP ajustada',val:r.mpAjust,color:'var(--amber)'},{label:'Procesamiento',val:r.proc,color:'var(--teal)'}]);
  return `
  <div class="gauto" style="margin-bottom:14px">
    <div class="card stat accent"><div class="card-b stat"><div class="k">Costo unitario ${c.flete?'c/flete':'s/flete'}</div>
      <div class="v">${usd(r.costoU,3)}<small>/kg</small></div><div class="d">${ars(r.arsU)}/kg</div></div></div>
    <div class="card stat"><div class="card-b stat"><div class="k">Total ${nf(c.qty)} kg</div>
      <div class="v">${usd(r.totalUSD,2)}</div><div class="d">${ars(r.totalARS)}</div></div></div>
  </div>
  ${!ok?`<div class="banner warn" style="margin-bottom:12px">⚠ La receta suma ${pct(r.sum,0)} (debería ser 100%).</div>`:''}
  <div class="card" style="margin-bottom:12px"><div class="card-b">${bar}
    <div class="tbl-wrap" style="margin-top:12px"><table><tbody>
      ${c.r.map((x,i)=>x>0?`<tr><td style="text-align:left"><span class="chip">${cods[i].cod}</span> ${cods[i].desc}</td><td class="num">${pct(x,0)}</td><td class="num">${usd(c.mp[i],2)}</td><td class="num">${usd(x*(c.mp[i]||0),3)}</td></tr>`:'').join('')}
      <tr class="total"><td style="text-align:left">MP base</td><td></td><td></td><td class="num">${usd(r.mpBase,3)}</td></tr>
      <tr><td style="text-align:left">× factor merma (1 ÷ (1 − ${pct(c.merma,0)}))</td><td></td><td></td><td class="num">× ${r.factor.toFixed(3)}</td></tr>
      <tr class="total"><td style="text-align:left">MP ajustada</td><td></td><td></td><td class="num">${usd(r.mpAjust,3)}</td></tr>
      <tr><td style="text-align:left">+ Procesamiento ${c.flete?'c/flete':'s/flete'}</td><td></td><td></td><td class="num">${usd(r.proc,3)}</td></tr>
      <tr class="total" style="background:var(--teal-l)"><td style="text-align:left">= Costo unitario</td><td></td><td></td><td class="num"><b>${usd(r.costoU,3)}</b></td></tr>
    </tbody></table></div></div></div>`;
}

async function exportPetCalc(){
  const c=petCalc, r=petCalcCompute(), cods=S.pet.insumos.slice(0,6), wb=new ExcelJS.Workbook(), ws=wb.addWorksheet('Cálculo');
  const H=[{t:'Concepto',k:'k',w:34},{t:'Valor',k:'v',w:16},{t:'Detalle',k:'d',w:30}];
  petTitle(wb,ws,'PET Lámina · Cálculo de costo',H.length); setCols(ws,H); headerRow(ws,4,H);
  const rows=[];
  cods.forEach((m,i)=>{ if(c.r[i]>0) rows.push({k:m.cod+' · '+m.desc, v:c.mp[i], d:pct(c.r[i],0)+' · aporte '+usd(c.r[i]*c.mp[i],3)}); });
  rows.push({k:'MP base',v:r.mpBase,d:'USD/kg'});
  rows.push({k:'Factor merma neta',v:r.factor,d:'1 ÷ (1 − '+pct(c.merma,0)+')'});
  rows.push({k:'MP ajustada',v:r.mpAjust,d:'USD/kg'});
  rows.push({k:'Procesamiento '+(c.flete?'c/flete':'s/flete'),v:r.proc,d:'USD/kg'});
  rows.push({k:'COSTO UNITARIO',v:r.costoU,d:'USD/kg · '+ars(r.arsU)+'/kg'});
  rows.push({k:'Tipo de cambio',v:c.tc,d:'ARS/USD'});
  rows.push({k:'Cantidad',v:c.qty,d:'kg'});
  rows.push({k:'TOTAL',v:r.totalUSD,d:'USD · '+ars(r.totalARS)});
  dataRows(ws,5,H,rows);
  await download(wb,'Winflex_PET_calculo.xlsx');
}

/* ============================================================
   MODAL + SIMULADORES
   ============================================================ */
function openModal(html,wide){ const m=$('#modal'); m.innerHTML=html; m.classList.toggle('wide',!!wide); m.scrollTop=0; $('#modalBg').classList.add('open'); }
function closeModal(){ $('#modalBg').classList.remove('open'); $('#modal').classList.remove('wide'); }
$('#modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });

const MODS={
  pe:{name:'Film PE',unit:'/kg',hasPrice:false},
  pet:{name:'PET Lámina',unit:'/kg',hasPrice:true},
  petpe:{name:'Laminado PET/PE',unit:'/kg',hasPrice:true},
  bandejas:{name:'Bandejas',unit:'/millar',hasPrice:true}
};
function clone(o){ return JSON.parse(JSON.stringify(o)); }

function summarize(mod){
  if(mod==='pe'){ const c=calcPE().total; return {cost:c,margin:null,unit:'/kg'}; }
  if(mod==='pet'){ const vr=petVariantes(); const rows=S.pet.clientes.map(c=>petClientRow(c,vr));
    return {cost:rows.reduce((a,r)=>a+r.costo,0)/(rows.length||1), margin:rows.reduce((a,r)=>a+r.margenNeto,0)/(rows.length||1), unit:'/kg'}; }
  if(mod==='petpe'){ const rows=S.petpe.productos.map(petpeRow);
    return {cost:rows.reduce((a,r)=>a+r.costo,0)/(rows.length||1), margin:rows.reduce((a,r)=>a+r.margenNeto,0)/(rows.length||1), unit:'/kg'}; }
  if(mod==='bandejas'){ const p=S.bandejas.params; const prods=S.bandejas.productos.map(bandejaCost);
    const cost=prods.reduce((a,r)=>a+r.usdMillar,0)/(prods.length||1);
    const ms=[]; S.bandejas.ensaladeras.forEach(e=>Object.entries(e.p).forEach(([cod,v])=>{const pr=e.mon==='USD'?v:v/TC();const co=bandejaCostByCod(cod);ms.push(pr?(pr-co)/pr:0);}));
    Object.entries(S.bandejas.clamshells).forEach(([cod,v])=>{const co=bandejaCostByCod(cod);ms.push(v?(v-co)/v:0);});
    return {cost,margin:ms.reduce((a,x)=>a+x,0)/(ms.length||1),unit:'/millar'}; }
}
function applyScenario(cl,mod,mpM,prM){
  if(mod==='pe') cl.pe.insumos.forEach(i=>i.usd*=mpM);
  if(mod==='pet'){ cl.pet.insumos.forEach(i=>i.usd*=mpM); cl.pet.clientes.forEach(c=>c.act*=prM); }
  if(mod==='petpe'){ cl.petpe.params.costoLaminaPET*=mpM; cl.petpe.params.costoLaminaPE*=mpM; cl.petpe.productos.forEach(p=>p.precio*=prM); }
  if(mod==='bandejas'){ cl.bandejas.params.mpCristal*=mpM; cl.bandejas.params.mpNegro*=mpM;
    cl.bandejas.ensaladeras.forEach(e=>{for(const k in e.p)e.p[k]*=prM;}); for(const k in cl.bandejas.clamshells)cl.bandejas.clamshells[k]*=prM; }
}
function scenarioResult(mod,mpPct,prPct,tcVal){
  const orig=S; const cl=clone(orig);
  applyScenario(cl,mod,1+mpPct/100,1+prPct/100);
  cl.tc.value=tcVal;
  S=cl; const scen=summarize(mod); S=orig;
  return scen;
}
function openSim(mod){
  const m=MODS[mod]; const base=summarize(mod);
  openModal(`
    <div class="modal-h"><h3>📊 Simulador · ${m.name}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="note" style="margin-bottom:14px">Probá escenarios sin tocar la lista. ${m.hasPrice?'Podés aplicar el aumento de precios a la lista real con el botón de abajo.':'Este módulo es un insumo interno (sin precios de venta).'}</div>
      <div class="sim-row head"><div>Variable</div><div>Base</div><div>Escenario</div><div></div></div>
      <div class="sim-row"><div>${mod==='petpe'?'Costo láminas (PET+PE) %':mod==='bandejas'?'Costo MP rPET %':'Precio MP / insumos %'}</div>
        <div class="base">0%</div><div><input id="simMP" type="number" step="1" value="0"></div><div>%</div></div>
      ${m.hasPrice?`<div class="sim-row"><div>Precios de venta %</div><div class="base">0%</div><div><input id="simPR" type="number" step="1" value="0"></div><div>%</div></div>`:'<input type="hidden" id="simPR" value="0">'}
      <div class="sim-row"><div>Tipo de cambio</div><div class="base">${ars(TC())}</div><div><input id="simTC" type="number" step="1" value="${Math.round(TC())}"></div><div>ARS</div></div>

      <div class="grid g2" style="margin-top:18px">
        <div class="card"><div class="card-b stat"><div class="k">Costo promedio</div>
          <div class="v" id="rCost">${usd(base.cost,m.unit==='/millar'?2:3)}<small>${base.unit}</small></div>
          <div class="d" id="rCostD">sin cambios</div></div></div>
        <div class="card"><div class="card-b stat"><div class="k">Margen ${mod==='bandejas'?'bruto':mod==='pe'?'—':'neto'} prom.</div>
          <div class="v" id="rMar">${base.margin!=null?pct(base.margin,1):'—'}</div>
          <div class="d" id="rMarD">sin cambios</div></div></div>
      </div>
    </div>
    <div class="modal-foot">
      ${m.hasPrice?`<button class="btn amber" id="simApplyPrice">Aplicar aumento de precios a la lista</button>`:''}
      <button class="btn primary" onclick="closeModal()">Cerrar</button>
    </div>`);

  function recompute(){
    const mp=num($('#simMP').value), pr=num($('#simPR').value), tc=num($('#simTC').value)||TC();
    const scen=scenarioResult(mod,mp,pr,tc);
    const dC=base.cost?(scen.cost-base.cost)/base.cost:0;
    $('#rCost').innerHTML=usd(scen.cost,m.unit==='/millar'?2:3)+`<small>${base.unit}</small>`;
    $('#rCostD').innerHTML=`<span class="delta ${dC>0.0001?'down':dC<-0.0001?'up':'flat'}">${dC>0?'+':''}${pct(dC,1)} vs base</span>`;
    if(base.margin!=null){ $('#rMar').textContent=pct(scen.margin,1);
      const dM=scen.margin-base.margin;
      $('#rMarD').innerHTML=`<span class="delta ${dM>0.0001?'up':dM<-0.0001?'down':'flat'}">${dM>0?'+':''}${(dM*100).toFixed(1)} pts</span>`; }
  }
  $('#simMP').oninput=recompute; if($('#simPR').oninput!==undefined)$('#simPR').oninput=recompute; $('#simTC').oninput=recompute;
  if($('#simApplyPrice')) $('#simApplyPrice').onclick=()=>{
    const pr=num($('#simPR').value);
    if(!pr){ toast('Poné un % de aumento primero','err'); return; }
    if(!confirm(`¿Aplicar +${pr}% a TODOS los precios de venta de ${m.name}? Conviene guardar una versión antes.`)) return;
    applyScenario(S,mod,1,1+pr/100); commit(); closeModal(); renderActive(); toast(`Precios de ${m.name} actualizados +${pr}%`,'ok');
  };
}
const openPetSim=()=>openSim('pet'), openPeSim=()=>openSim('pe'), openPpSim=()=>openSim('petpe'), openBandejasSim=()=>openSim('bandejas');

/* ============================================================
   HISTORIAL DE LISTAS (snapshot manual)
   ============================================================ */
function priceSnapshot(){
  // captura compacta de todas las listas de precios + TC + costos promedio
  const vr=petVariantes();
  const petRows=S.pet.clientes.map(c=>petClientRow(c,vr));
  const ppRows=S.petpe.productos.map(petpeRow);
  return {
    tc:TC(),
    pet:S.pet.clientes.map(c=>({cli:c.cli,v:c.v,act:c.act})),
    petpe:S.petpe.productos.map(p=>({cli:p.cli,med:p.med,precio:p.precio})),
    bandejas:{ ensaladeras:clone(S.bandejas.ensaladeras), clamshells:clone(S.bandejas.clamshells) },
    kpis:{
      petMargen:petRows.reduce((a,r)=>a+r.margenNeto,0)/(petRows.length||1),
      ppMargen:ppRows.reduce((a,r)=>a+r.margenNeto,0)/(ppRows.length||1),
      peCosto:calcPE().total
    }
  };
}
function openSnapshot(){
  openModal(`
    <div class="modal-h"><h3>🕘 Guardar versión de listas</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="note" style="margin-bottom:14px">Se guarda una foto de todas las listas de precios y el TC actual. Después podés consultarla o restaurarla desde el historial.</div>
      <div class="field"><label>Etiqueta de la versión</label>
        <div class="iw"><input id="snapLabel" type="text" placeholder="Ej: Lista marzo 2026 post-aumento" style="font-family:'IBM Plex Sans'"></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="snapSave">Guardar versión</button>
    </div>`);
  $('#snapLabel').focus();
  $('#snapSave').onclick=()=>{
    const label=$('#snapLabel').value.trim()||('Versión '+new Date().toLocaleString('es-AR'));
    S.history.unshift({ id:Date.now(), date:nowISO(), label, snap:priceSnapshot() });
    if(S.history.length>50) S.history.length=50;
    commit(); closeModal(); toast('Versión guardada','ok');
  };
}

            <button class="btn sm" data-restore="${h.id}">Restaurar</button>

      </tbody></table></div>
      <div class="note" style="margin-top:10px">Restaurar reescribe los precios actuales con los de esa versión (los parámetros de costo no se tocan). Conviene guardar la versión vigente antes.</div>
    </div>
    <div class="modal-foot"><button class="btn primary" onclick="closeModal()">Cerrar</button></div>`);
  $$('#modal [data-restore]').forEach(b=>b.onclick=()=>{
    const h=S.history.find(x=>x.id==b.dataset.restore); if(!h)return;
    if(!confirm(`¿Restaurar precios de “${h.label}”? Se sobrescriben los precios actuales.`)) return;
    restoreSnapshot(h.snap); commit(); closeModal(); renderActive(); toast('Versión restaurada','ok');
  });
  $$('#modal [data-delh]').forEach(b=>b.onclick=()=>{
    S.history=S.history.filter(x=>x.id!=b.dataset.delh); commit(); openHistory();
  });
}
function restoreSnapshot(snap){
  snap.pet.forEach((p,i)=>{ if(S.pet.clientes[i]){ S.pet.clientes[i].act=p.act; S.pet.clientes[i].v=p.v; } });
  snap.petpe.forEach((p,i)=>{ if(S.petpe.productos[i]) S.petpe.productos[i].precio=p.precio; });
  if(snap.bandejas){ S.bandejas.ensaladeras=clone(snap.bandejas.ensaladeras); S.bandejas.clamshells=clone(snap.bandejas.clamshells); }
}

const CLR={ teal:'FF1FA055', tealD:'FF0E7A3A', tealL:'FFEAF6EF', amber:'FFC8761A', amberL:'FFFBF0E2',
  green:'FFE7F6EE', greenT:'FF1F8F4E', yellow:'FFFCF4DD', yellowT:'FFB07D06', red:'FFFBE9E9', redT:'FFD64545',
  ink:'FF15201F', muted:'FF6B7280', line:'FFDDE3E6', white:'FFFFFFFF', zebra:'FFF4FBF6' };

function fill(c){ return {type:'pattern',pattern:'solid',fgColor:{argb:c}}; }
function thinBorder(){ const s={style:'thin',color:{argb:CLR.line}}; return {top:s,left:s,bottom:s,right:s}; }

/* Encabezado PET: logo limpio sobre blanco (fila 1) + barra verde Winflex (fila 2) + subtítulo (fila 3) */
function petTitle(wb,ws,title,ncols){

  ws.mergeCells(3,1,3,ncols);

}
function addTitle(ws,title,sub,ncols){
  ws.mergeCells(1,1,1,ncols);
  const t=ws.getCell(1,1); t.value='WINFLEX · '+title; t.font={name:'Arial',bold:true,size:16,color:{argb:CLR.white}};
  t.fill=fill(CLR.teal); t.alignment={vertical:'middle',horizontal:'left',indent:1}; ws.getRow(1).height=30;
  ws.mergeCells(2,1,2,ncols);
  const s=ws.getCell(2,1); s.value=sub; s.font={name:'Arial',size:10,italic:true,color:{argb:CLR.muted}};
  s.fill=fill(CLR.tealL); s.alignment={horizontal:'left',indent:1}; ws.getRow(2).height=18;
}
function headerRow(ws,r,headers){
  const row=ws.getRow(r);
  headers.forEach((h,i)=>{ const c=row.getCell(i+1); c.value=h.t;
    c.font={name:'Arial',bold:true,size:10,color:{argb:CLR.white}}; c.fill=fill(CLR.tealD);
    c.alignment={horizontal:i===0?'left':'right',vertical:'middle',wrapText:true}; c.border=thinBorder(); });
  row.height=26;
}
function dataRows(ws,start,headers,rows){
  rows.forEach((rd,ri)=>{ const R=start+ri; const row=ws.getRow(R);
    headers.forEach((h,ci)=>{ const c=row.getCell(ci+1); const val=rd[h.k];
      if(h.f){ const res=(val===undefined||val===null||val==='')?0:val; c.value={formula:h.f(R,rd),result:res}; }
      else c.value=(val===undefined||val===null||val==='')?(h.fmt?0:''):val;
      c.font={name:'Arial',size:10,color:{argb:CLR.ink}};
      c.alignment={horizontal:ci===0?'left':'right'};
      if(h.fmt) c.numFmt=h.fmt;
      c.border=thinBorder();
      if(ri%2===1) c.fill=fill(CLR.zebra);
      if(h.sem && val!=null){ const s=semaforo(val, rd.__sg??0.30, rd.__sa??0.15);
        c.fill=fill(s==='v'?CLR.green:s==='a'?CLR.yellow:CLR.red);
        c.font={name:'Arial',size:10,bold:true,color:{argb:s==='v'?CLR.greenT:s==='a'?CLR.yellowT:CLR.redT}}; }
    });
  });
}
function setCols(ws,headers){ headers.forEach((h,i)=>{ ws.getColumn(i+1).width=h.w||12; }); }
function totalRow(ws,r,headers,vals){
  const row=ws.getRow(r);
  headers.forEach((h,i)=>{ const c=row.getCell(i+1); c.value=vals[h.k]!==undefined?vals[h.k]:(i===0?'PROMEDIO':'');
    c.font={name:'Arial',bold:true,size:10,color:{argb:CLR.ink}}; c.fill=fill(CLR.amberL);
    c.alignment={horizontal:i===0?'left':'right'}; if(h.fmt&&vals[h.k]!==undefined)c.numFmt=h.fmt; c.border=thinBorder(); });
  row.height=22;
}

/* ---------------- Calculadora de costos PE ---------------- */
function peCalcDefaults(){
  const c=calcPE(), p=S.pe.params;
  const pct=S.pe.insumos.map(ins=>{ const r=S.pe.receta.find(x=>x.cod===ins.cod); return r?r.p:0; });
  peCalc={ ins:S.pe.insumos.map(i=>({cod:i.cod,desc:i.desc,usd:i.usd})), pct,
    tc:Math.round(TC()), merma:p.merma, proc:c.proc, qty:1000 };
}
function peCalcCompute(){
  const c=peCalc; let mpBase=0; c.ins.forEach((m,i)=>mpBase+=(c.pct[i]||0)*(m.usd||0));
  const factor=1/(1-c.merma); const mpAjust=mpBase*factor;
  const total=mpAjust+c.proc; const sum=c.pct.reduce((a,x)=>a+x,0);
  return {mpBase,factor,mpAjust,proc:c.proc,total,arsU:total*c.tc,sum,totalUSD:total*c.qty,totalARS:total*c.tc*c.qty};
}

function generatePeCostPDF(id){
  if(!window.jspdf||!window.jspdf.jsPDF){ toast('Generador de PDF no disponible','err'); return; }
  let label,tc,comp,receta,insumos;
  if(id==='__cur__'){ const c=calcPE(); label='Costo actual'; tc=TC();
    comp={total:c.total,mpAjust:c.mpAjust,mpBase:c.mpBase,factor:c.factor,proc:c.proc,MO:c.MO,energia:c.energia,otros:c.otros,indirectos:c.indirectos};
    receta=S.pe.receta; insumos=S.pe.insumos; }
  else { const h=(S.pe.costHistory||[]).find(x=>x.id==id); if(!h){toast('Versión no encontrada','err');return;}
    label=h.label; tc=h.tc; comp=h; receta=h.receta; insumos=h.insumos; }
  const { jsPDF }=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'}); const W=doc.internal.pageSize.getWidth();
  doc.setFillColor(40,168,92); doc.rect(0,0,W,68,'F');
  const logo=winflexLogoDataURL(); if(logo){ try{ doc.addImage(logo,/jpe?g/.test(logo)?'JPEG':'PNG',36,11,86,46); }catch(e){} }
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  doc.text('WINFLEX S.A. — Costo Film PE', W-36, 30, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(`${label} · TC ${ars(tc)} · ${new Date().toLocaleDateString('es-AR')}`, W-36, 48, {align:'right'});
  doc.autoTable({ startY:84, theme:'grid', styles:{font:'helvetica',fontSize:9,cellPadding:4},
    headStyles:{fillColor:[31,160,85],textColor:255}, columnStyles:{0:{halign:'left'}}, margin:{left:36,right:36},
    head:[['Componente','USD/kg','ARS/kg','% costo']],
    body:[['Materia prima (MP ajustada)',usd(comp.mpAjust,4),ars(comp.mpAjust*tc),pct(comp.mpAjust/(comp.total||1),1)],
      ['Mano de obra',usd(comp.MO,4),ars(comp.MO*tc),pct(comp.MO/(comp.total||1),1)],
      ['Energía',usd(comp.energia,4),ars(comp.energia*tc),pct(comp.energia/(comp.total||1),1)],
      ['Otros varios',usd(comp.otros,4),ars(comp.otros*tc),pct(comp.otros/(comp.total||1),1)],
      ['Otros indirectos',usd(comp.indirectos,4),ars(comp.indirectos*tc),pct(comp.indirectos/(comp.total||1),1)]],
    foot:[['COSTO TOTAL',usd(comp.total,4),ars(comp.total*tc),'100%']],
    footStyles:{fillColor:[234,246,239],textColor:[14,122,58],fontStyle:'bold'} });
  const recBody=receta.filter(r=>r.p>0).map(r=>{ const ins=insumos.find(x=>x.cod===r.cod)||{};
    return [ (ins.cod||r.cod)+' · '+(ins.desc||''), pct(r.p,0), usd(ins.usd||0,2), usd(r.p*(ins.usd||0),3) ]; });
  doc.autoTable({ startY:doc.lastAutoTable.finalY+18, theme:'grid', styles:{font:'helvetica',fontSize:9,cellPadding:4},
    headStyles:{fillColor:[31,160,85],textColor:255}, columnStyles:{0:{halign:'left'}}, margin:{left:36,right:36},
    head:[['Receta de mezcla','%','USD/kg','Aporte']], body:recBody,
    foot:[['MP base → × '+comp.factor.toFixed(3)+' → MP ajustada','', usd(comp.mpBase,3), usd(comp.mpAjust,3)]],
    footStyles:{fillColor:[244,251,246],textColor:[21,32,31]} });
  doc.setFontSize(8); doc.setTextColor(120);
  doc.text('Winflex S.A. · Envases especiales · Film PE es insumo interno (no se vende)', 36, doc.internal.pageSize.getHeight()-24);
  doc.output('dataurlnewwindow');
}

/* ---------------- Calculadora PET/PE ---------------- */
function ppCalcDefaults(){
  const pr=S.petpe.productos[0]||{aPET:450,ePET:250,aPE:470,ePE:50,aFin:421,tiras:1,precio:3.5};
  ppCalc={ geom:{aPET:pr.aPET,ePET:pr.ePET,aPE:pr.aPE,ePE:pr.ePE,aFin:pr.aFin,tiras:pr.tiras},
    cPET:petpeCostPET(), cPE:petpeCostPE(), proc:petpeProc().procKg, tc:Math.round(TC()), precio:pr.precio||0, qty:1000 };
}
function ppCalcCompute(){
  const c=ppCalc, g=c.geom, dPET=S.petpe.params.densPET, dPE=S.petpe.params.densPE, n=S.petpe.net;
  const yPET=(g.aFin*g.tiras)/(g.aPET||1), yPE=(g.aFin*g.tiras)/(g.aPE||1);
  const gPET=g.ePET*dPET, gPE=g.ePE*dPE, gTot=(gPET+gPE)||1;
  const pPET=gPET/gTot, pPE=gPE/gTot;
  const kgPET=pPET/(yPET||1), kgPE=pPE/(yPE||1), kgTot=kgPET+kgPE;
  const cPET=kgPET*c.cPET, cPE=kgPE*c.cPE, cProc=kgTot*c.proc, costo=cPET+cPE+cProc;
  const margenBruto=c.precio?(c.precio-costo)/c.precio:0;
  const gastos=c.precio*(n.admin+n.iibb+n.dyc+n.financiero);
  const preGan=c.precio-costo-gastos, gan=Math.max(0,preGan*n.ganancias);
  const netoUSD=preGan-gan, margenNeto=c.precio?netoUSD/c.precio:0;
  return {yPET,yPE,gPET,gPE,pPET,pPE,kgPET,kgPE,kgTot,cPET,cPE,cProc,costo,margenBruto,netoUSD,margenNeto,
    totalUSD:costo*c.qty,totalARS:costo*c.tc*c.qty,arsU:costo*c.tc};
}

function ppSnapshot(label){
  const proc=petpeProc(), cPET=petpeCostPET(), cPE=petpeCostPE();
  const rows=S.petpe.productos.map(petpeRow);
  const avgCost=rows.reduce((a,r)=>a+r.costo,0)/(rows.length||1);
  return { id:Date.now(), date:nowISO(), label:label||('Costo '+new Date().toLocaleDateString('es-AR')),
    tc:TC(), proc:clone(proc), cPET, cPE, avgCost,
    params:clone(S.petpe.params), adhesivos:clone(S.petpe.adhesivos), net:clone(S.petpe.net),

/* ---------------- Calculadora de bandejas ---------------- */
function baCalcDefaults(){
  const pr=S.bandejas.productos[0]||{cod:'F40',mat:'Cristal',bruto:15.6,neto:12,vel:7000,otros:0.05}, p=S.bandejas.params;
  baCalc={ nombre:'', cod:pr.cod, mat:pr.mat, bruto:pr.bruto, neto:pr.neto, vel:pr.vel, otros:pr.otros,
    mpCristal:p.mpCristal, mpNegro:p.mpNegro, recuperacion:p.recuperacion, energia:p.energia,
    MOh:Math.round(p.salario*p.operarios*(1+p.cargas)), tc:Math.round(TC()), precio:0, qty:1000 };
}
function baCalcCompute(){
  const c=baCalc, desp=c.bruto-c.neto, mpUtil=(c.neto+desp*(1-c.recuperacion))/1000;
  const precioMP=c.mat==='Negro'?c.mpNegro:c.mpCristal;
  const cMP=mpUtil*precioMP, cMO=(c.MOh/(c.vel||1))/(c.tc||1), cEner=mpUtil*c.energia, cOtros=mpUtil*c.otros;
  const totalU=cMP+cMO+cEner+cOtros, usdMillar=totalU*1000;
  const margen=c.precio?(c.precio-usdMillar)/c.precio:0;
  return {desp,mpUtil,precioMP,cMP,cMO,cEner,cOtros,totalU,usdMillar,margen,
    totalUSD:usdMillar*(c.qty/1000),totalARS:usdMillar*c.tc*(c.qty/1000),arsMillar:usdMillar*c.tc};
}

function baListSnapshot(label){
  const p=S.bandejas.params, tc=TC();
  const ens=[]; S.bandejas.ensaladeras.forEach(e=>Object.entries(e.p).forEach(([cod,val])=>{
    const precio=e.mon==='USD'?val:val/tc, costo=bandejaCostByCod(cod);

  const clam=Object.entries(S.bandejas.clamshells).map(([cod,val])=>{ const costo=bandejaCostByCod(cod);
    return {cod,val,costo,m:val?(val-costo)/val:0}; });
  const allM=[...ens.map(r=>r.m),...clam.map(r=>r.m)];
  return { id:Date.now(), date:nowISO(), label:label||('Lista '+new Date().toLocaleDateString('es-AR')), tc,
    avgMargen:allM.reduce((a,m)=>a+m,0)/(allM.length||1),
    ensaladeras:clone(S.bandejas.ensaladeras), clamshells:clone(S.bandejas.clamshells),
    ensView:ens, clamView:clam };
}
function baListSave(){
  openModal(`<div class="modal-h"><h3>💾 Guardar lista de precios — Bandejas</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b"><div class="note" style="margin-bottom:12px">Guarda una foto de los precios actuales (ensaladeras por cliente + clamshells) y el TC. La lista vigente sigue activa; las guardadas quedan en el historial para consultar, imprimir o reactivar.</div>
      <div class="field"><label>Etiqueta de la versión</label><div class="iw"><input id="baListLabel" type="text" placeholder="Ej: Lista temporada 2026" style="font-family:'IBM Plex Sans'"></div></div></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="baListSaveBtn">Guardar versión</button></div>`);
  $('#baListLabel').focus();
  $('#baListSaveBtn').onclick=()=>{
    S.bandejas.listHistory=S.bandejas.listHistory||[];
    S.bandejas.listHistory.unshift(baListSnapshot($('#baListLabel').value.trim()));
    if(S.bandejas.listHistory.length>50) S.bandejas.listHistory.length=50;
    commit(); closeModal(); toast('Lista guardada','ok');
  };
}
function openBaListHistory(){
  S.bandejas.listHistory=S.bandejas.listHistory||[];
  const cur=baListSnapshot('Lista actual (en edición)');
  const card=(active,h)=>`
    <div style="border:1px solid ${active?'var(--teal)':'var(--line)'};background:${active?'var(--teal-l)':'var(--card)'};border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer" data-blhpdf="${active?'__cur__':h.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="text-align:left"><div style="font-weight:700;font-size:14px">${active?'<span style="color:var(--teal)">● ACTIVA</span> — ':''}${h.label}</div>
          <div class="note" style="margin-top:2px">${active?'Se actualiza con lo que cargás en la solapa Precios':new Date(h.date).toLocaleString('es-AR')} · ${h.ensView.length} ensaladeras + ${h.clamView.length} clamshells</div></div>
        <div style="text-align:right;white-space:nowrap"><div class="mono" style="font-size:13px">margen prom. <b>${pct(h.avgMargen,1)}</b></div>
          <div class="note">TC ${ars(h.tc)}</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px" data-noclick>
        <button class="btn sm" data-blpdf="${active?'__cur__':h.id}">📄 PDF</button>
        ${active?'<span class="note" style="align-self:center">Lista en uso</span>'
          :`<button class="btn sm primary" data-blact="${h.id}">Activar</button><button class="btn sm" data-bldel="${h.id}" style="color:var(--red)">Eliminar</button>`}
      </div>
    </div>`;
  openModal(`<div class="modal-h"><h3>🕘 Historial de listas de precios — Bandejas</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="note" style="margin-bottom:12px">La tarjeta resaltada es la lista <b>activa</b> (en uso). Tocá cualquier tarjeta para abrir su PDF listo para imprimir o descargar. Usá <b>Activar</b> para volver a esa lista de precios.</div>
      ${card(true,cur)}
      ${S.bandejas.listHistory.length?S.bandejas.listHistory.map(h=>card(false,h)).join('')
        :'<div class="empty" style="padding:14px">Todavía no guardaste ninguna lista. Usá “💾 Guardar lista”.</div>'}
    </div>
    <div class="modal-foot"><button class="btn primary" onclick="closeModal()">Cerrar</button></div>`,true);
  $$('#modal [data-blhpdf]').forEach(c=>c.onclick=e=>{ if(e.target.closest('[data-noclick]'))return; generateBaListPDF(c.dataset.blhpdf); });
  $$('#modal [data-blpdf]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); generateBaListPDF(b.dataset.blpdf); });
  $$('#modal [data-blact]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const h=S.bandejas.listHistory.find(x=>x.id==b.dataset.blact); if(!h)return;
    if(!confirm(`¿Activar “${h.label}”? Pasa a ser la lista en uso (se sobrescriben los precios actuales).`)) return;
    S.bandejas.ensaladeras=clone(h.ensaladeras); S.bandejas.clamshells=clone(h.clamshells);
    commit(); closeModal(); renderBandejas(); toast('Lista activada','ok'); });
  $$('#modal [data-bldel]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); S.bandejas.listHistory=S.bandejas.listHistory.filter(x=>x.id!=b.dataset.bldel); commit(); openBaListHistory(); });
}
function generateBaListPDF(id){
  if(!window.jspdf||!window.jspdf.jsPDF){ toast('Generador de PDF no disponible','err'); return; }
  let h; if(id==='__cur__') h=baListSnapshot('Lista actual'); else { h=(S.bandejas.listHistory||[]).find(x=>x.id==id); if(!h){toast('Versión no encontrada','err');return;} }
  const { jsPDF }=window.jspdf, doc=new jsPDF({unit:'pt',format:'a4'}), W=doc.internal.pageSize.getWidth();
  doc.setFillColor(40,168,92); doc.rect(0,0,W,68,'F');
  const logo=winflexLogoDataURL(); if(logo){ try{ doc.addImage(logo,/jpe?g/.test(logo)?'JPEG':'PNG',36,11,86,46); }catch(e){} }
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  doc.text('WINFLEX S.A. — Lista de precios Bandejas', W-36, 30, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(`${h.label} · TC ${ars(h.tc)} · ${new Date().toLocaleDateString('es-AR')}`, W-36, 48, {align:'right'});
  doc.autoTable({ startY:84, theme:'grid', styles:{font:'helvetica',fontSize:9,cellPadding:4},
    headStyles:{fillColor:[31,160,85],textColor:255}, alternateRowStyles:{fillColor:[244,251,246]},
    columnStyles:{0:{halign:'left'}}, margin:{left:36,right:36},
    head:[['ENSALADERAS','Cliente','Mon.','Precio orig.','USD/millar','Costo','Margen%']],
    body:h.ensView.map(r=>[r.cod,r.cli,r.mon,nf(r.val),usd(r.precio,2),usd(r.costo,2),pct(r.m,1)]) });
  doc.autoTable({ startY:doc.lastAutoTable.finalY+16, theme:'grid', styles:{font:'helvetica',fontSize:9,cellPadding:4},
    headStyles:{fillColor:[31,160,85],textColor:255}, alternateRowStyles:{fillColor:[244,251,246]},
    columnStyles:{0:{halign:'left'}}, margin:{left:36,right:36},
    head:[['CLAMSHELLS','USD/millar','Costo','Margen USD','Margen%']],
    body:h.clamView.map(r=>[r.cod,usd(r.val,2),usd(r.costo,2),usd(r.val-r.costo,2),pct(r.m,1)]) });
  doc.setFontSize(8); doc.setTextColor(120);
  doc.text('Winflex S.A. · Envases especiales · Bandejas termoformadas', 36, doc.internal.pageSize.getHeight()-24);
  doc.output('dataurlnewwindow');
}
async function exportConsolidado(){
  const d=moduleSummary(); const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('Resumen ejecutivo');
  const H=[{t:'Módulo',k:'mod',w:22},{t:'Ítems',k:'n',w:9,fmt:XF.int},{t:'Margen prom.',k:'avg',w:13,fmt:XF.pct,sem:true},
    {t:'Costo ref. USD',k:'cost',w:14,fmt:XF.usd3},{t:'Peor ítem',k:'worst',w:26},{t:'Peor margen',k:'wm',w:12,fmt:XF.pct}];
  addTitle(ws,'Costos & Precios · Consolidado',stamp(),H.length); setCols(ws,H); headerRow(ws,4,H);
  const rows=[
    {mod:'PET Lámina (neto)',n:d.petC.length,avg:d.petAvg,cost:d.petC.reduce((a,r)=>a+r.costo,0)/(d.petC.length||1),worst:d.petMin.cli||'-',wm:d.petMin.margenNeto||0,__sg:0.30,__sa:0.15},
    {mod:'Laminado PET/PE (neto)',n:d.ppRows.length,avg:d.ppAvg,cost:d.ppRows.reduce((a,r)=>a+r.costo,0)/(d.ppRows.length||1),worst:d.ppMin.cli||'-',wm:d.ppMin.margenNeto||0,__sg:0.30,__sa:0.15},
    {mod:'Bandejas (bruto)',n:d.bRows.length,avg:d.bAvg,cost:0,worst:(d.bMin.cli||'-')+' '+(d.bMin.cod||''),wm:d.bMin.m||0,__sg:S.bandejas.params.semVerde,__sa:S.bandejas.params.semAmarillo},
    {mod:'Film PE (insumo)',n:1,avg:'',cost:d.peTot,worst:'-',wm:''}
  ];
  dataRows(ws,5,H,rows);
  ws.views=[{state:'frozen',ySplit:4}];
  await download(wb,'Winflex_Costos_consolidado.xlsx');
}

/* ============================================================
   LOGIN + INIT
   ============================================================ */
function tryLogin(){
  const inp=$('#pinInput'); const v=(inp.value||'').trim();
  if(v===CONFIG.ADMIN_PIN){ $('#loginErr').textContent=''; enterApp(); }
  else{
    $('#loginErr').textContent='PIN incorrecto';
    inp.classList.add('shake'); inp.value='';
    setTimeout(()=>{ inp.classList.remove('shake'); $('#loginErr').textContent=''; inp.focus(); },800);
  }
}
async function enterApp(){
  $('#login').style.display='none'; $('#app').style.display='block';
  await loadState();
  if(S.tc.mode==='auto') await fetchTC();
  renderTCBar(); renderActive();
}
function setTab(tab){
  activeTab=tab;
  $$('#tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  $$('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+tab));
  renderActive();
}

function init(){
  const _bi=document.querySelector('.brand-img'),_li=document.querySelector('#login .logo-img');
  if(_bi&&_li&&_li.src) _bi.src=_li.src;
  const inp=$('#pinInput');
  $('#pinGo').onclick=tryLogin;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
  inp.focus();
  $$('#tabs button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  $('#btnHistory').onclick=openHistory;
  $('#btnSettings').onclick=openSettings;
  $('#btnLogout').onclick=()=>{ $('#pinInput').value=''; $('#app').style.display='none'; $('#login').style.display='flex'; $('#pinInput').focus(); };
  $('#tcInput').onchange=e=>{ S.tc.value=num(e.target.value); S.tc.mode='manual'; commit(); renderTCBar(); renderActive(); };
  $('#tcRefresh').onclick=()=>refreshTC(true);
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&$('#modalBg').classList.contains('open')) closeModal(); });
}
init();
</script>
